<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimania</title>

<style>
:root{
  --primary:#244E8F;
  --bg:#F7FBFF;
  --warn:#F5A623;
  --danger:#D64545;
}

*{box-sizing:border-box;}
html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:#0f172a;}

.page{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:16px;gap:14px;}

.topbar{display:flex;justify-content:space-between;align-items:center;}

button{border-radius:14px;padding:14px;font-weight:900;cursor:pointer;}
.primary{background:var(--primary);color:#fff;border:none;}
.outline{background:transparent;color:var(--primary);border:2px solid var(--primary);}

.sticky{margin-top:auto;display:flex;gap:10px;position:sticky;bottom:10px;}

.timerRow{display:flex;align-items:center;gap:12px;}
#countdown{font-size:56px;font-weight:900;color:var(--primary);min-width:90px;}
.bar{flex:1;height:14px;background:rgba(36,78,143,.15);border-radius:999px;overflow:hidden;}
.bar div{height:100%;width:0%;background:var(--primary);transition:width .2s linear;}

.gameCard{
  position:relative;
  width:100%;
  height:min(62vh,560px);
  background-repeat:no-repeat;
  background-position:center;
  background-size:contain;
  display:flex;
  flex-direction:column;
  padding:56px 44px 46px;
}

@media (orientation:portrait){
  .gameCard{
    background-image:url("assets/card_bg_staand.png");
  }
  #question{font-size:22px;}
  #answerValue{font-size:24px;}
}

@media (orientation:landscape){
  .gameCard{
    background-image:url("assets/card_bg_liggend.png");
    height:min(60vh,420px);
    padding:40px 52px;
  }
  .ribbon{width:50%;}
}

.ribbon{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  width:70%;
  max-width:360px;
}

.pill{
  font-size:12px;
  font-weight:900;
  color:var(--primary);
  margin-top:40px;
}

#question{font-weight:800;}
#answerValue{font-weight:900;margin-top:14px;}

#intro{
  position:fixed;
  inset:0;
  background:#F7FBFF;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:opacity .8s ease;
}

#intro img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.fade-out{opacity:0;pointer-events:none;}
</style>
</head>

<body>

<div id="intro">
  <img src="assets/intro.jpg" alt="Intro">
</div>

<div class="page">

<div class="topbar">
  <div><strong>Estimania</strong></div>
</div>

<div class="gameCard">
  <img src="assets/ribbon.png" class="ribbon">
  <div class="pill" id="category">Categorie: —</div>
  <div id="question"></div>
  <div id="answerValue"></div>
</div>

<div class="timerRow">
  <div id="countdown"></div>
  <div class="bar"><div id="barFill"></div></div>
</div>

<div class="sticky">
  <button class="primary" id="askBtn">VRAAG</button>
  <button class="outline" id="revealBtn">ESTIMANIA</button>
</div>

</div>

<script>
const askBtn = document.getElementById("askBtn");
const revealBtn = document.getElementById("revealBtn");
const questionEl = document.getElementById("question");
const answerEl = document.getElementById("answerValue");
const countdownEl = document.getElementById("countdown");
const barFill = document.getElementById("barFill");
const categoryEl = document.getElementById("category");

let questions = [];
let timer = null;
let duration = 15;
let audioCtx = null;

function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  }
}

function tone(freq=800, ms=120){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = freq;
  gain.gain.value = 0.1;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  setTimeout(()=>{osc.stop();},ms);
}

function speak(text){
  if(!("speechSynthesis" in window)) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "nl-NL";
  utter.volume = 1;
  window.speechSynthesis.speak(utter);
}

function loadData(){
  fetch("VragenDatabase.json")
  .then(r=>r.json())
  .then(d=>{questions=d;})
  .catch(()=>{
    questions=[{
      Vraag:"Is dit een test vraag?",
      Verwacht:"Ja dit is een testvraag.",
      Categorie:"Test"
    }];
  });
}

function startQuestion(){
  initAudio();
  if(questions.length===0){
    questions=[{
      Vraag:"Is dit een test vraag?",
      Verwacht:"Ja dit is een testvraag.",
      Categorie:"Test"
    }];
  }
  const q = questions[Math.floor(Math.random()*questions.length)];
  questionEl.textContent=q.Vraag;
  answerEl.textContent="";
  categoryEl.textContent="Categorie: "+(q.Categorie||"Algemeen");
  speak(q.Vraag);
  runTimer(q);
}

function runTimer(q){
  clearInterval(timer);
  let t=duration;
  countdownEl.textContent=t;
  barFill.style.width="100%";
  timer=setInterval(()=>{
    t--;
    if(t<=3 && t>0) tone(900,80);
    if(t<=0){
      clearInterval(timer);
      tone(200,300);
      revealAnswer(q);
    }
    countdownEl.textContent=t>0?t:"0";
    barFill.style.width=(t/duration*100)+"%";
  },1000);
}

function revealAnswer(q){
  answerEl.textContent=q.Verstacht||q.Verwacht||"";
}

askBtn.onclick=startQuestion;
revealBtn.onclick=()=>{
  if(questionEl.textContent){
    revealAnswer({Verwacht:answerEl.textContent});
  }
};

window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("intro").classList.add("fade-out");
  },3000);
});

loadData();
</script>

</body>
</html>
